# ─── CropAI Docker Compose ────────────────────────────────────────────────────
# Start both services: docker-compose up --build

version: "3.9"

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────
  api:
    build: .
    container_name: cropai-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
      - ./logs:/app/logs
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - cropai-net

  # ── React Frontend ──────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: cropai-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cropai-net

  # ── Nginx Reverse Proxy (optional) ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cropai-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - cropai-net

networks:
  cropai-net:
    driver: bridge

volumes:
  cropai-data:
